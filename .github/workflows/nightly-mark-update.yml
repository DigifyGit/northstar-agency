name: Nightly Mark Update

on:
  schedule:
    # 06:15 UTC daily (adjust as needed for local morning).
    - cron: "15 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  nightly-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build nightly summary (no scraping)
        run: npm run nightly:update

      - name: Upsert daily comment in issue
        uses: actions/github-script@v7
        env:
          DAILY_UPDATE_ISSUE_NUMBER: ${{ secrets.DAILY_UPDATE_ISSUE_NUMBER }}
        with:
          script: |
            const fs = require('fs');
            const marker = '<!-- northstar-nightly-mark-update -->';
            const issueNumber = Number(process.env.DAILY_UPDATE_ISSUE_NUMBER || '0');
            if (!issueNumber) {
              core.setFailed('Missing secret DAILY_UPDATE_ISSUE_NUMBER.');
              return;
            }

            const body = fs.readFileSync('tmp/nightly_mark_update.md', 'utf8');
            const { owner, repo } = context.repo;

            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number: issueNumber,
              per_page: 100
            });

            const existing = comments.find((c) => typeof c.body === 'string' && c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
              core.info(`Updated comment ${existing.id} on issue #${issueNumber}.`);
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: issueNumber,
                body
              });
              core.info(`Created nightly comment on issue #${issueNumber}.`);
            }
