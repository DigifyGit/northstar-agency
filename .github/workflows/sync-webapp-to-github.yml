name: Sync Webapp Repo

on:
  push:
    branches: ["main"]
    paths:
      - "webapp/**"
      - ".github/workflows/sync-webapp-to-github.yml"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout current repo
        uses: actions/checkout@v4

      - name: Push webapp subtree to external repo
        env:
          TARGET_REPO: DigifyGit/northstar-agency-webapp
          TARGET_BRANCH: main
          SYNC_TOKEN: ${{ secrets.WEBAPP_SYNC_PAT }}
        run: |
          set -euo pipefail

          if [ -z "${SYNC_TOKEN}" ]; then
            echo "WEBAPP_SYNC_PAT secret is missing."
            exit 1
          fi

          tmpdir="$(mktemp -d)"
          cp -R webapp/. "${tmpdir}/"

          cd "${tmpdir}"
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "sync: webapp from northstar-agency ${GITHUB_SHA}" || true

          git remote add origin "https://x-access-token:${SYNC_TOKEN}@github.com/${TARGET_REPO}.git"
          git push --force origin "HEAD:${TARGET_BRANCH}"
