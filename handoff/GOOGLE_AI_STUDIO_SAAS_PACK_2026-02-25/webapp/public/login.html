<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>NorthStar Login</title>
  <style>
    :root {
      --bg0: #070c18;
      --bg1: #0f1629;
      --surface: rgba(18, 28, 50, 0.74);
      --line: rgba(203, 224, 252, 0.2);
      --text: #edf4ff;
      --muted: #a6bad9;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 16px;
      color: var(--text);
      font-family: Sora, Outfit, "Segoe UI", sans-serif;
      background:
        radial-gradient(700px 460px at 15% 0%, rgba(87, 140, 255, 0.2), transparent 58%),
        linear-gradient(145deg, var(--bg0), var(--bg1));
    }
    .card {
      width: min(420px, 100%);
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px;
      background: linear-gradient(145deg, var(--surface), rgba(27, 40, 68, 0.52));
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 46px rgba(2, 9, 24, 0.55);
    }
    h1 { margin: 0 0 8px; font-size: 1.35rem; }
    p { margin: 0; color: var(--muted); font-size: .9rem; line-height: 1.5; }
    form { margin-top: 14px; display: grid; gap: 10px; }
    input {
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: 11px;
      padding: 10px;
      font: inherit;
      color: var(--text);
      background: rgba(8, 14, 28, 0.6);
    }
    input:focus { outline: 1px solid rgba(101,214,255,0.6); }
    button {
      min-height: 44px;
      border: 1px solid rgba(214, 234, 255, 0.3);
      border-radius: 11px;
      background: linear-gradient(145deg, rgba(255,255,255,0.16), rgba(255,255,255,0.05));
      color: var(--text);
      font-weight: 700;
      cursor: pointer;
    }
    .error { color: #ffb7c0; font-size: .84rem; min-height: 1.2em; }
    .hint { margin-top: 10px; font-size: .8rem; color: #93abd1; }
    a { color: #b8e7ff; }
  </style>
</head>
<body>
  <main class="card">
    <h1>Login to NorthStar Web App</h1>
    <p>Use your credentials to access the protected job sourcing dashboard.</p>

    <form id="loginForm">
      <input id="username" name="username" placeholder="Username" autocomplete="username" required>
      <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required>
      <button type="submit">Login</button>
      <div id="error" class="error" role="alert"></div>
    </form>

    <p class="hint">Demo default credentials can be overridden by server env vars.</p>
    <p class="hint"><a href="/">Back to Landing Page</a></p>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.textContent = '';

      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password })
      });

      if (res.ok) {
        window.location.href = '/app';
        return;
      }

      const data = await res.json().catch(() => ({}));
      errorEl.textContent = data.error || 'Login failed.';
    });
  </script>
</body>
</html>
